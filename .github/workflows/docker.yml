name: Docker

on:
  push:
    branches: ["main"]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: docker.io
  # 修改为你的 Docker Hub 用户名
  IMAGE_NAME: ${{ vars.DOCKER_USERNAME || 'zmabin' }}/openlist-chunk

jobs:
  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate tags
        id: meta
        run: |
          TAGS="${{ env.IMAGE_NAME }}:latest"
          # If tag push like v1.0.0, also tag with version
          if [[ "${{ github.ref }}" =~ ^refs/tags/v ]]; then
            VERSION="${{ github.ref_name }}"
            TAGS="${TAGS},${{ env.IMAGE_NAME }}:${VERSION}"
            # Also tag without v prefix (e.g., 1.0.0)
            TAGS="${TAGS},${{ env.IMAGE_NAME }}:${VERSION#v}"
          fi
          # Tag with short commit SHA
          SHORT_SHA="${GITHUB_SHA::7}"
          TAGS="${TAGS},${{ env.IMAGE_NAME }}:${SHORT_SHA}"
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  ghcr:
    name: Build and push to ghcr.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags
        id: meta
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/openlist-chunk"
          TAGS="${IMAGE}:latest"
          if [[ "${{ github.ref }}" =~ ^refs/tags/v ]]; then
            VERSION="${{ github.ref_name }}"
            TAGS="${TAGS},${IMAGE}:${VERSION}"
            TAGS="${TAGS},${IMAGE}:${VERSION#v}"
          fi
          SHORT_SHA="${GITHUB_SHA::7}"
          TAGS="${TAGS},${IMAGE}:${SHORT_SHA}"
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
