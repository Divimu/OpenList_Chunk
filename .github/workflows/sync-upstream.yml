name: Sync Upstream

on:
  schedule:
    - cron: '0 2 * * *'  # daily at 02:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    name: Sync from upstream OpenList
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN || github.token }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream
        run: git remote add upstream https://github.com/OpenListTeam/OpenList.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Merge upstream and auto-resolve conflicts
        id: merge
        run: |
          # List of chunk-specific files that should always keep our fork's version
          CHUNK_FILES=(
            "server/handles/fsup.go"
            "server/router.go"
            "internal/conf/const.go"
            "internal/bootstrap/data/setting.go"
            "internal/bootstrap/config.go"
            "pkg/cron/cron.go"
            "pkg/cron/cron_test.go"
            "conf.d/openlist.conf"
            "go.mod"
          )

          # Try a clean merge first
          if git merge upstream/main --no-edit 2>/dev/null; then
            echo "Merge succeeded without conflicts."
            git push origin main
            echo "result=synced" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Conflicts detected. Auto-resolving..."

          # Restore our chunk files (keep fork version)
          for file in "${CHUNK_FILES[@]}"; do
            if git ls-files -u -- "$file" | grep -q "^"; then
              echo "Keeping fork version of: $file"
              git checkout --ours "$file" 2>/dev/null
              git add "$file"
            fi
          done

          # Accept upstream for remaining conflicting files
          CONFLICTS=$(git diff --name-only --diff-filter=U 2>/dev/null)
          if [ -n "$CONFLICTS" ]; then
            for file in $CONFLICTS; do
              echo "Accepting upstream version of: $file"
              git checkout --theirs "$file"
              git add "$file"
            done
          fi

          # Verify no conflicts remain
          if [ -n "$(git diff --name-only --diff-filter=U 2>/dev/null)" ]; then
            echo "ERROR: Unresolved conflicts remaining!"
            git status
            exit 1
          fi

          git commit -m "chore: merge upstream changes and auto-resolve conflicts" --no-verify
          git push origin main
          echo "result=synced" >> $GITHUB_OUTPUT

      - name: Sync result
        run: |
          if [ "${{ steps.merge.outputs.result }}" = "synced" ]; then
            echo "Upstream changes have been synced successfully."
          else
            echo "No changes to sync."
          fi
