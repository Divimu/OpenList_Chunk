name: Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: '0 6 * * *'  # daily at 06:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            name: linux-amd64
          - goos: linux
            goarch: arm64
            name: linux-arm64
          - goos: darwin
            goarch: amd64
            name: darwin-amd64
          - goos: darwin
            goarch: arm64
            name: darwin-arm64
          - goos: windows
            goarch: amd64
            name: windows-amd64
            ext: .exe
          - goos: windows
            goarch: arm64
            name: windows-arm64
            ext: .exe
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Download frontend
        run: |
          echo "Downloading frontend from upstream..."
          FRONTEND_REPO="OpenListTeam/OpenList-Frontend"
          AUTH_HEADER=""
          if [ -n "${{ secrets.GITHUB_TOKEN }}" ]; then
            AUTH_HEADER="-H \"Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}\""
          fi

          # Try rolling tag first, fall back to latest release
          RELEASE_JSON=$(eval "curl -fsSL --max-time 10 $AUTH_HEADER -H \"Accept: application/vnd.github.v3+json\" \"https://api.github.com/repos/${FRONTEND_REPO}/releases/tags/rolling\"" 2>/dev/null)
          if [ -z "$RELEASE_JSON" ] || echo "$RELEASE_JSON" | grep -q "Not Found"; then
            echo "Rolling release not found, trying latest..."
            RELEASE_JSON=$(eval "curl -fsSL --max-time 10 $AUTH_HEADER -H \"Accept: application/vnd.github.v3+json\" \"https://api.github.com/repos/${FRONTEND_REPO}/releases/latest\"")
          fi

          TAR_URL=$(echo "$RELEASE_JSON" | jq -r '.assets[].browser_download_url // empty' | grep "openlist-frontend-dist" | grep -v "lite" | grep "\.tar\.gz$" | head -1)
          if [ -z "$TAR_URL" ]; then
            echo "No frontend dist found, skipping frontend download"
            mkdir -p public/dist
          else
            echo "Downloading frontend dist..."
            curl -fsSL "$TAR_URL" -o dist.tar.gz
            rm -rf public/dist && mkdir -p public/dist
            tar -xzf dist.tar.gz -C public/dist
            rm -rf dist.tar.gz
            echo "Frontend downloaded successfully"
          fi

      - name: Build binary
        run: |
          export GOOS=${{ matrix.goos }}
          export GOARCH=${{ matrix.goarch }}
          export CGO_ENABLED=0

          BUILT_AT="$(date +'%F %T %z')"
          GIT_COMMIT="$(git log --pretty=format:'%h' -1 2>/dev/null || echo 'unknown')"
          GIT_AUTHOR="OpenList_Chunk Contributors"
          VERSION="$(git describe --abbrev=0 --tags 2>/dev/null || echo 'v0.0.0')"
          WEB_VERSION="rolling"

          LDFLAGS="-w -s \
            -X 'github.com/OpenListTeam/OpenList/v4/internal/conf.BuiltAt=${BUILT_AT}' \
            -X 'github.com/OpenListTeam/OpenList/v4/internal/conf.GitAuthor=${GIT_AUTHOR}' \
            -X 'github.com/OpenListTeam/OpenList/v4/internal/conf.GitCommit=${GIT_COMMIT}' \
            -X 'github.com/OpenListTeam/OpenList/v4/internal/conf.Version=${VERSION}' \
            -X 'github.com/OpenListTeam/OpenList/v4/internal/conf.WebVersion=${WEB_VERSION}' \
          "
          echo "Building for $GOOS/$GOARCH ..."
          mkdir -p build
          go build -ldflags="$LDFLAGS" -tags=jsoniter -o "build/openlist-${{ matrix.name }}${{ matrix.ext }}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openlist_${{ github.sha }}_${{ matrix.name }}
          path: build/*
